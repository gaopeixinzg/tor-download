name: Tor Proxy Tunnel

on:
  push:
    paths:
      - .github/workflows/tor-proxy.yml
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install 3proxy
        run: sudo apt-get update -qq && sudo apt-get install -y -qq 3proxy

      - name: Start SOCKS5 proxy
        run: |
          sudo bash -c 'echo "nserver 8.8.8.8
nscache 65536
timeouts 1 5 30 60 180 1800 15 60
daemon
auth none
socks -p1080
allow *" > /etc/3proxy.cfg'
          sudo 3proxy /etc/3proxy.cfg
          echo "SOCKS5 started"

      - name: Expose via serveo
        run: |
          sudo apt-get install -y -qq sshpass
          ssh -o StrictHostKeyChecking=no -R 80:localhost:1080 serveo.net 2>&1 | head -5 &
          sleep 5
          curl -s https://serveo.net 2>&1 || true
          echo "Tunnel attempt done"

      - name: Keep alive
        run: sleep 21600
